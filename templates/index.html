<!DOCTYPE html>
<html>

<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">🚀 User Dashboard</h2>

    <!-- SEARCH -->
    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-8">
            <input type="number" name="user_id" class="form-control" placeholder="Enter User ID">
        </div>
        <div class="col-md-4">
            <button class="btn btn-primary w-100">Search</button>
        </div>
    </form>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    {% if user %}
    <div class="alert alert-success">
        Found: {{ user.name }} ({{ user.email }})
    </div>
    {% endif %}

    <!-- ADD USER -->
    <form method="POST" action="/add" class="row g-3 mb-4">
        <div class="col-md-5">
            <input type="text" name="name" class="form-control" placeholder="Enter Name" required>
        </div>
        <div class="col-md-5">
            <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
        </div>
        <div class="col-md-2">
            <button class="btn btn-success w-100">Add</button>
        </div>
    </form>

    <!-- USERS TABLE -->
    <table class="table table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.name }}</td>
                <td>{{ u.email }}</td>
                <td>
                    <a href="/delete/{{ u.id }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>

</html>
